<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisionVR — Detección de Objetos en AR</title>
  <meta name="description" content="Frontend WebXR para detección de objetos en realidad aumentada con Meta Quest 3">
  <!-- A-Frame: framework WebXR (Local para modo Offline) -->
  <script src="/js/aframe.min.js"></script>
  <!-- Socket.IO: cliente WebSocket (Local para modo Offline) -->
  <script src="/js/socket.io.min.js"></script>

  <style>
    /* ─── Reset ─────────────────────────────────────────────────────────── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      overflow: hidden;
    }

    /* ─── Panel de configuración (barra superior) ──────────────────────── */
    #panel-config {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border-bottom: 2px solid #00ff88;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      box-shadow: 0 4px 30px rgba(0, 255, 136, 0.15);
      backdrop-filter: blur(10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    #panel-config.oculto {
      opacity: 0;
      transform: translateY(-100%);
      pointer-events: none;
    }

    #panel-config h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #00ff88;
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    #panel-config label {
      font-size: 0.85rem;
      color: #a0a0b0;
      white-space: nowrap;
    }

    #input-ip {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      font-size: 0.95rem;
      width: 260px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    #input-ip:focus {
      border-color: #00ff88;
      box-shadow: 0 0 12px rgba(0, 255, 136, 0.3);
    }

    #btn-conectar {
      background: linear-gradient(135deg, #00ff88, #00cc6a);
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #btn-conectar:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4);
    }

    #btn-conectar:active {
      transform: translateY(0);
    }

    #btn-conectar:disabled {
      background: #555;
      color: #999;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    #estado {
      font-size: 0.9rem;
      padding: 6px 14px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s;
      white-space: nowrap;
    }

    #estado.conectado {
      background: rgba(0, 255, 136, 0.12);
      border-color: #00ff88;
      color: #00ff88;
    }

    #estado.error {
      background: rgba(255, 68, 68, 0.12);
      border-color: #ff4444;
      color: #ff4444;
    }

    /* ─── Overlay de estadísticas (2D, visible fuera de VR) ────────────── */
    #panel-stats-2d {
      position: fixed;
      top: 80px;
      right: 16px;
      z-index: 9998;
      background: rgba(10, 10, 15, 0.85);
      border: 1px solid rgba(0, 255, 136, 0.25);
      border-radius: 12px;
      padding: 16px;
      min-width: 220px;
      backdrop-filter: blur(8px);
      display: none;
    }

    #panel-stats-2d.visible { display: block; }

    #panel-stats-2d h3 {
      color: #00ff88;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 0.85rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .stat-label { color: #888; }
    .stat-value { color: #fff; font-weight: 600; }

    /* ─── Detecciones en 2D (fuera de VR) ──────────────────────────────── */
    #detecciones-2d {
      position: fixed;
      bottom: 16px;
      left: 16px;
      right: 16px;
      z-index: 9998;
      display: none;
      gap: 8px;
      flex-wrap: wrap;
    }

    #detecciones-2d.visible { display: flex; }

    .tag-2d {
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- ═══ SECCIÓN 1: Panel de Configuración ═══════════════════════════════ -->
  <div id="panel-config">
    <h1>🔬 VisionVR</h1>
    <label for="input-ip">IP del servidor:</label>
    <input
      type="text"
      id="input-ip"
      placeholder="http://192.168.1.105:5000"
      value="http://localhost:5000"
    >
    <button id="btn-conectar" onclick="conectar()">Conectar</button>
    <span id="estado">⏸ Desconectado</span>
  </div>

  <!-- ═══ Panel de estadísticas 2D (fuera de VR) ═════════════════════════ -->
  <div id="panel-stats-2d">
    <h3>📊 Estadísticas</h3>
    <div class="stat-row">
      <span class="stat-label">Frames enviados</span>
      <span class="stat-value" id="stat-frames">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Objetos detectados</span>
      <span class="stat-value" id="stat-objetos">0</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Último tiempo</span>
      <span class="stat-value" id="stat-tiempo">— ms</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">Confianza prom.</span>
      <span class="stat-value" id="stat-confianza">—</span>
    </div>
  </div>

  <!-- ═══ Tags de detecciones 2D ═════════════════════════════════════════ -->
  <div id="detecciones-2d"></div>

  <!-- ═══ SECCIÓN 2: Escena A-Frame (WebXR con passthrough) ══════════════ -->
  <a-scene
    id="escena"
    webxr="requiredFeatures: local-floor; optionalFeatures: hand-tracking, bounded-floor, depth-sensing"
    depth-reader
    renderer="colorManagement: true; physicallyCorrectLights: true"
    background="color: #0a0a0f"
    vr-mode-ui="enabled: true"
  >
    <!-- Cámara con controles básicos -->
    <a-entity id="rig" position="0 1.6 0">
      <a-camera id="camara" look-controls wasd-controls></a-camera>
      
      <!-- Controles de Manos Nativos de Meta Quest -->
      <a-entity id="leftHand" hand-tracking-controls="hand: left" gesture-listener></a-entity>
      <a-entity id="rightHand" hand-tracking-controls="hand: right" raycaster="objects: .etiqueta-vr; showLine: true" gesture-listener></a-entity>
    </a-entity>

    <!-- Contenedor de etiquetas flotantes 3D (se llenan por JS) -->
    <a-entity id="contenedor-etiquetas" position="0 1.6 -2"></a-entity>

    <!-- Panel de estadísticas 3D (visible en VR) -->
    <a-entity
      id="panel-stats-vr"
      position="0.8 2.2 -1.5"
      rotation="0 -20 0"
      visible="false"
    >
      <a-plane
        width="0.6"
        height="0.45"
        color="#111122"
        opacity="0.85"
        side="double"
      ></a-plane>
      <a-text
        id="stats-vr-text"
        value="Estadísticas\n─────────\nEsperando datos..."
        color="#00ff88"
        width="1"
        position="0 0 0.01"
        align="center"
        font="monoid"
      ></a-text>
    </a-entity>

    <!-- Panel de Historial 3D -->
    <a-entity
      id="panel-historial-vr"
      position="-0.8 2.2 -1.5"
      rotation="0 20 0"
      visible="false"
    >
      <a-plane
        width="0.7"
        height="0.6"
        color="#111122"
        opacity="0.85"
        side="double"
      ></a-plane>
      <a-text
        id="historial-vr-text"
        value="Historial\n─────────\n..."
        color="#00d8ff"
        width="1.2"
        position="-0.3 0.2 0.01"
        align="left"
        anchor="left"
        baseline="top"
        font="monoid"
      ></a-text>
    </a-entity>

    <!-- Iluminación ambiental mínima -->
    <a-light type="ambient" color="#fff" intensity="0.6"></a-light>
  </a-scene>

  <!-- ═══ SECCIÓN 3: Script JavaScript ═══════════════════════════════════ -->
  <script>
    // ─── A-Frame: Componentes Interactivos para Manos ─────────────────────
    
    // 1. Escuchar Gestos (Pellizco)
    AFRAME.registerComponent('gesture-listener', {
      init: function () {
        this.el.addEventListener('pinchstarted', (evt) => {
          // Verificar si el raycaster está apuntando a algo
          const raycasterEl = this.el.components.raycaster;
          if (raycasterEl && raycasterEl.intersectedEls.length > 0) {
              const intersectedEl = raycasterEl.intersectedEls[0];
              const objectName = intersectedEl.dataset.objeto;
              
              if (objectName) {
                  console.log("Pellizco sobre objeto:", objectName);
                  hablar(`Buscando información sobre ${objectName}`);
                  
                  // Llamar al backend (Groq Llama-3)
                  const url = document.getElementById('server-ip').value.replace(/\/+$/, '');
                  fetch(`${url}/explicar`, {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({ objeto: objectName, contexto: "laboratorio de computación" })
                  })
                  .then(res => res.json())
                  .then(data => {
                      if(data.explicacion) {
                          hablar(data.explicacion);
                      }
                  })
                  .catch(err => {
                      console.error(err);
                      hablar("Error al contactar a la inteligencia artificial.");
                  });
              }
          } else {
              console.log("Pellizco al aire detectado.");
          }
        });
      }
    });

    // 2. Comportamiento de las etiquetas al señalarlas
    AFRAME.registerComponent('etiqueta-interactiva', {
      init: function () {
        this.el.addEventListener('raycaster-intersected', evt => {
          // Ampliar al apuntar con la mano
          this.el.setAttribute('scale', '1.3 1.3 1.3');
        });
        this.el.addEventListener('raycaster-intersected-cleared', evt => {
          // Restaurar tamaño normal
          this.el.setAttribute('scale', '1 1 1');
        });
      }
    });

    // 3. Lector de Profundidad WebXR (Depth API)
    window.lastDepthInfo = null;
    AFRAME.registerComponent('depth-reader', {
      tick: function (time, timeDelta) {
        if (!this.el.is('vr-mode')) return;
        
        const frame = this.el.sceneEl.frame;
        if (!frame) return;
        
        const refSpace = this.el.sceneEl.systems.webxr.sessionReferenceSpace;
        const viewerPose = frame.getViewerPose(refSpace);
        if (!viewerPose) return;
        
        const view = viewerPose.views[0];
        if (view && frame.getDepthInformation) {
            try {
                const depthInfo = frame.getDepthInformation(view);
                if (depthInfo) {
                    window.lastDepthInfo = depthInfo;
                }
            } catch(e) {
                // Falla silenciosamente si no está disponible aún
            }
        }
      }
    });

    // ─── Estado global ────────────────────────────────────────────────────
    let servidorURL = '';
    let conectado = false;
    let intervaloCaptura = null;
    let enviando = false; // Evita enviar si el anterior no ha respondido
    let socket = null;
    let historialObjetos = []; // Almacena los últimos 10 objetos detectados

    // Estadísticas de sesión
    const stats = {
      framesEnviados: 0,
      totalObjetos: 0,
      ultimoTiempo: 0,
      sumaConfianza: 0,
      conteoConfianza: 0
    };

    // ─── Referencias DOM ──────────────────────────────────────────────────
    const inputIP = document.getElementById('input-ip');
    const btnConectar = document.getElementById('btn-conectar');
    const elEstado = document.getElementById('estado');
    const panelConfig = document.getElementById('panel-config');
    const panelStats2D = document.getElementById('panel-stats-2d');
    const detecciones2D = document.getElementById('detecciones-2d');

    // ─── Ocultar panel al entrar/salir de VR ──────────────────────────────
    const escena = document.getElementById('escena');

    escena.addEventListener('enter-vr', () => {
      document.getElementById('panel-stats-vr').setAttribute('visible', 'true');
      document.getElementById('panel-historial-vr').setAttribute('visible', 'true');
      // Ocultar UI 2D para que no estorbe (opcional, pero buena práctica)
      document.getElementById('capa-ui').style.display = 'none';
      panelConfig.classList.add('oculto');
      panelStats2D.classList.remove('visible');
      detecciones2D.classList.remove('visible');

      // Mostrar panel VR de estadísticas
      const panelVR = document.getElementById('panel-stats-vr');
      if (panelVR) panelVR.setAttribute('visible', 'true');
    });

    escena.addEventListener('exit-vr', () => {
      panelConfig.classList.remove('oculto');
      if (conectado) {
        panelStats2D.classList.add('visible');
        detecciones2D.classList.add('visible');
      }

      const panelVR = document.getElementById('panel-stats-vr');
      if (panelVR) panelVR.setAttribute('visible', 'false');
    });

    // ─── Conectar al servidor ─────────────────────────────────────────────
    async function conectar() {
      servidorURL = inputIP.value.trim().replace(/\/+$/, ''); // Quita trailing slashes

      if (!servidorURL) {
        mostrarEstado('⚠ Escribe la IP del servidor', 'error');
        return;
      }

      btnConectar.disabled = true;
      mostrarEstado('⏳ Conectando...', '');

      try {
        const resp = await fetch(`${servidorURL}/ping`, {
          method: 'GET',
          signal: AbortSignal.timeout(5000)
        });
        const data = await resp.json();

        if (data.status === 'ok') {
          // Inicializar conexión WebSocket
          socket = io(servidorURL);

          socket.on('connect', () => {
            conectado = true;
            mostrarEstado('✓ Conectado — iniciando detección', 'conectado');

            // Activar paneles
            panelStats2D.classList.add('visible');
            detecciones2D.classList.add('visible');

            // Síntesis de voz: confirmar conexión
            hablar('Sistema VisionVR activado');

            // Iniciar captura cada 500ms
            iniciarCaptura();
          });

          socket.on('connect_error', (err) => {
            console.error('Error de Socket.IO:', err);
            mostrarEstado('✗ Error en conexión WebSocket', 'error');
            conectado = false;
          });

          socket.on('disconnect', () => {
            conectado = false;
            mostrarEstado('⚠ Desconectado del servidor', 'error');
            if (intervaloCaptura) clearInterval(intervaloCaptura);
          });

          socket.on('detecciones_resultado', (data) => {
            enviando = false;
            if (data.error) {
              console.error('Error del servidor:', data.error);
              return;
            }

            // Actualizar estadísticas
            stats.framesEnviados++;
            stats.ultimoTiempo = data.tiempo_ms || 0;
            stats.totalObjetos += data.total || 0;

            // Procesar detecciones
            procesarDetecciones(data.detecciones || []);

            // Actualizar paneles de estadísticas
            actualizarEstadisticas();
          });

        } else {
          mostrarEstado('✗ Respuesta inesperada del servidor', 'error');
        }
      } catch (err) {
        console.error('Error de conexión:', err);
        mostrarEstado('✗ No se pudo conectar — verifica la IP', 'error');
      }

      btnConectar.disabled = false;
    }

    // ─── Mostrar estado en el badge ───────────────────────────────────────
    function mostrarEstado(texto, clase) {
      elEstado.textContent = texto;
      elEstado.className = clase || '';
    }

    // ─── Captura de frames ────────────────────────────────────────────────
    function iniciarCaptura() {
      if (intervaloCaptura) clearInterval(intervaloCaptura);

      intervaloCaptura = setInterval(() => {
        if (!conectado || enviando) return;
        capturarYEnviar();
      }, 500); // 2 FPS
    }

    function capturarYEnviar() {
      if (!socket || !socket.connected) {
          enviando = false;
          return;
      }
      enviando = true;

      try {
        // Obtener el canvas de A-Frame
        const canvas = escena.canvas;
        if (!canvas) {
          enviando = false;
          return;
        }

        // Capturar como JPEG en base64 (calidad 0.7 para rapidez)
        const base64 = canvas.toDataURL('image/jpeg', 0.7);

        // Enviar al servidor mediante WebSocket
        socket.emit("detectar", { imagen: base64 });

      } catch (err) {
        console.error('Error enviando frame:', err);
        enviando = false;
      }
    }

    // ─── Procesar detecciones ─────────────────────────────────────────────
    function procesarDetecciones(detecciones) {
      if (detecciones.length === 0) {
          limpiarEtiquetas();
          return;
      }

      // Anunciar por voz el primer objeto (solo la primera vez)
      const primero = detecciones[0];
      // hablar(`${primero.objeto}, ${Math.round(primero.confianza * 100)} por ciento`);

      const idsDetectados = new Set();

      // Actualizar o crear etiquetas
      detecciones.forEach((det, i) => {
        // Usar id_track si existe, sino crear un id temporal basado en índice y nombre
        const uid = det.id_track != null ? `track-${det.id_track}` : `temp-${i}-${det.objeto}`;
        idsDetectados.add(uid);
        
        actualizarOCrearEtiqueta3D(det, uid, i, detecciones.length);
        
        // Acumular confianza para promedio
        stats.sumaConfianza += det.confianza;
        stats.conteoConfianza++;
        
        // Agregar al historial si no es el último agregado
        if (historialObjetos.length === 0 || historialObjetos[0] !== det.objeto) {
            historialObjetos.unshift(det.objeto);
            if (historialObjetos.length > 8) historialObjetos.pop();
        }
      });

      actualizarHistorial();

      // Eliminar etiquetas que ya no están en la detección
      limpiarEtiquetasViejas(idsDetectados);
      
      // 2D tags (recrear para simplificar el panel 2D)
      detecciones2D.innerHTML = '';
      detecciones.forEach(det => crearEtiqueta2D(det));
    }

    function limpiarEtiquetasViejas(idsActivos) {
        const contenedor = document.getElementById('contenedor-etiquetas');
        if (!contenedor) return;
        Array.from(contenedor.children).forEach(hijo => {
            if (!idsActivos.has(hijo.id)) {
                contenedor.removeChild(hijo);
            }
        });
    }

    // ─── Actualizar o Crear etiqueta flotante 3D ────────────────
    function actualizarOCrearEtiqueta3D(deteccion, uid, indice, total) {
      const contenedor = document.getElementById('contenedor-etiquetas');
      if (!contenedor) return;

      const { objeto, confianza } = deteccion;
      const color = colorPorConfianza(confianza);
      const porcentaje = Math.round(confianza * 100);

      let x = 0, y = 0, z = 0;
      if (deteccion.bbox) {
        const cx = deteccion.bbox.x + deteccion.bbox.w / 2;
        const cy = deteccion.bbox.y + deteccion.bbox.h / 2;
        const ndcX = (cx / window.innerWidth) * 2 - 1;
        const ndcY = -((cy / window.innerHeight) * 2 - 1);
        x = ndcX * 2.5; 
        y = ndcY * 1.5; 
        z = -2; // Default si no hay lectura de profundidad

        // Si tenemos datos del sensor LiDAR/Infrarrojo del Meta Quest:
        if (window.lastDepthInfo) {
            try {
                const depthW = window.lastDepthInfo.width;
                const depthH = window.lastDepthInfo.height;
                const dX = Math.floor((cx / window.innerWidth) * depthW);
                const dY = Math.floor((cy / window.innerHeight) * depthH);
                
                if (dX >= 0 && dX < depthW && dY >= 0 && dY < depthH) {
                    const profMts = window.lastDepthInfo.getDepthInMeters(dX, dY);
                    // Validar que la lectura sea razonable (entre 10 cm y 10 metros)
                    if (profMts > 0.1 && profMts < 10) {
                        z = -profMts;
                        // Ajustar X e Y basado en la nueva profundidad por trigonometría simple
                        x = ndcX * profMts * 1.25; 
                        y = ndcY * profMts * 0.75;
                    }
                }
            } catch(e) {
                // Fallback silencioso a z = -2
            }
        }
      } else {
        const angulo = ((indice - (total - 1) / 2) * 0.4);
        x = Math.sin(angulo) * 2;
        y = 0.2 - (indice * 0.35);
        z = 0;
      }

      // Verificar si la entidad ya existe
      let entidad = document.getElementById(uid);
      
      if (entidad) {
          // Animación suave a la nueva posición
          entidad.setAttribute('animation__mov', `property: position; to: ${x} ${y} ${z}; dur: 200; easing: linear`);
          
          // Actualizar texto y color (por si cambia confianza)
          const textoEl = entidad.querySelector('a-text');
          if(textoEl) {
              textoEl.setAttribute('value', `${objeto.toUpperCase()}  ${porcentaje}%`);
              textoEl.setAttribute('color', color);
          }
          const barraEl = entidad.querySelectorAll('a-plane')[1];
          if(barraEl) {
              barraEl.setAttribute('color', color);
          }
      } else {
          // Si no existe, crearla desde cero
          entidad = document.createElement('a-entity');
          entidad.id = uid;
          entidad.dataset.objeto = objeto; // Guardamos el nombre para el gesto pinch
          entidad.classList.add('etiqueta-vr');
          entidad.setAttribute('position', `${x} ${y} ${z}`);
          entidad.setAttribute('look-at', '[camera]');
          entidad.setAttribute('etiqueta-interactiva', '');

          // Fondo
          const fondo = document.createElement('a-plane');
          fondo.setAttribute('width', '0.8');
          fondo.setAttribute('height', '0.18');
          fondo.setAttribute('color', '#111122');
          fondo.setAttribute('opacity', '0.88');
          fondo.setAttribute('side', 'double');

          // Barra
          const barra = document.createElement('a-plane');
          barra.setAttribute('width', '0.03');
          barra.setAttribute('height', '0.18');
          barra.setAttribute('color', color);
          barra.setAttribute('position', '-0.385 0 0.001');
          barra.setAttribute('side', 'double');

          // Texto
          const texto = document.createElement('a-text');
          texto.setAttribute('value', `${objeto.toUpperCase()}  ${porcentaje}%`);
          texto.setAttribute('color', color);
          texto.setAttribute('width', '1.5');
          texto.setAttribute('position', '-0.33 0 0.002');
          texto.setAttribute('align', 'left');

          entidad.appendChild(fondo);
          entidad.appendChild(barra);
          entidad.appendChild(texto);

          // Animación de entrada
          entidad.setAttribute('scale', '0 0 0');
          entidad.setAttribute('animation__scale', {
            property: 'scale',
            to: '1 1 1',
            dur: 300,
            easing: 'easeOutBack'
          });

          contenedor.appendChild(entidad);
      }
    }

    // ─── Crear etiqueta 2D (fuera de VR) ──────────────────────────────────
    function crearEtiqueta2D(deteccion) {
      const { objeto, confianza } = deteccion;
      const color = colorPorConfianza(confianza);
      const porcentaje = Math.round(confianza * 100);

      const tag = document.createElement('div');
      tag.className = 'tag-2d';
      tag.textContent = `${objeto} — ${porcentaje}%`;
      tag.style.background = `${color}22`;
      tag.style.color = color;
      tag.style.border = `1px solid ${color}`;

      detecciones2D.appendChild(tag);
    }

    // ─── Limpiar etiquetas ────────────────────────────────────────────────
    function limpiarEtiquetas() {
      // 3D
      const contenedor = document.getElementById('contenedor-etiquetas');
      if (contenedor) {
        while (contenedor.firstChild) {
          contenedor.removeChild(contenedor.firstChild);
        }
      }
      // 2D
      detecciones2D.innerHTML = '';
    }

    // ─── Color según nivel de confianza ───────────────────────────────────
    function colorPorConfianza(confianza) {
      if (confianza >= 0.75) return '#00ff88'; // Verde — alta
      if (confianza >= 0.50) return '#ffcc00'; // Amarillo — media
      return '#ff4444';                         // Rojo — baja
    }

    // ─── Actualizar paneles de estadísticas ───────────────────────────────
    function actualizarEstadisticas() {
      const promConfianza = stats.conteoConfianza > 0
        ? (stats.sumaConfianza / stats.conteoConfianza * 100).toFixed(1)
        : '—';

      // Panel 2D
      document.getElementById('stat-frames').textContent = stats.framesEnviados;
      document.getElementById('stat-objetos').textContent = stats.totalObjetos;
      document.getElementById('stat-tiempo').textContent = `${stats.ultimoTiempo} ms`;
      document.getElementById('stat-confianza').textContent =
        promConfianza !== '—' ? `${promConfianza}%` : '—';

      // Panel 3D (en VR)
      const statsVRText = document.getElementById('stats-vr-text');
      if (statsVRText) {
        statsVRText.setAttribute('value',
          `Estadísticas\n` +
          `─────────────\n` +
          `Frames:  ${stats.framesEnviados}\n` +
          `Objetos: ${stats.totalObjetos}\n` +
          `Tiempo:  ${stats.ultimoTiempo} ms\n` +
          `Conf:    ${promConfianza}%`
        );
      }
    }

    // ─── Actualizar Historial 3D ──────────────────────────────────────────
    function actualizarHistorial() {
        const histVRText = document.getElementById('historial-vr-text');
        if (histVRText && historialObjetos.length > 0) {
            let texto = "Historial Reciente\n──────────────────\n";
            historialObjetos.forEach((obj, i) => {
                texto += `${i + 1}. ${obj.toUpperCase()}\n`;
            });
            histVRText.setAttribute('value', texto);
        }
    }

    // ─── Síntesis de voz ──────────────────────────────────────────────────
    let vozDisponible = false;

    // Intentar activar la voz después de la primera interacción
    document.addEventListener('click', () => {
      if (!vozDisponible) {
        vozDisponible = true;
        // Hacer un utterance silencioso para desbloquear
        const u = new SpeechSynthesisUtterance('');
        u.volume = 0;
        speechSynthesis.speak(u);
      }
    }, { once: false });

    function hablar(texto) {
      if (!('speechSynthesis' in window)) {
        console.warn('SpeechSynthesis no disponible');
        return;
      }

      // Cancelar cualquier utterance anterior para no acumular cola
      speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(texto);
      utterance.lang = 'es-ES';
      utterance.rate = 1.1;
      utterance.pitch = 1.0;
      utterance.volume = 1.0;

      // Intentar usar una voz en español
      const voces = speechSynthesis.getVoices();
      const vozES = voces.find(v => v.lang.startsWith('es'));
      if (vozES) utterance.voice = vozES;

      speechSynthesis.speak(utterance);
    }

    // Precargar voces (algunos navegadores las cargan async)
    if ('speechSynthesis' in window) {
      speechSynthesis.getVoices();
      speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
    }

    // ─── Permitir conectar con Enter ──────────────────────────────────────
    inputIP.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') conectar();
    });

    // ─── Look-at component (para que las etiquetas miren a la cámara) ─────
    AFRAME.registerComponent('look-at', {
      schema: { type: 'selector' },
      tick: function () {
        const target = this.data ? document.querySelector(this.data) : null;
        if (target) {
          const targetPos = target.object3D.getWorldPosition(new THREE.Vector3());
          this.el.object3D.lookAt(targetPos);
        }
      }
    });

    console.log('VisionVR Frontend cargado — esperando conexión');

    // ─── Service Worker para Modo Offline ─────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('✅ Service Worker registrado para Modo Offline:', reg.scope))
          .catch(err => console.log('❌ Error al registrar Service Worker:', err));
      });
    }

  </script>
</body>
</html>
