<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionVR — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #0b0c10;
            --surface-color: rgba(31, 33, 42, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-glow: rgba(0, 255, 136, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #8b92a5;
            --accent: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, var(--accent-glow), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 150, 255, 0.1), transparent 25%);
            background-attachment: fixed;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 span {
            color: var(--accent);
        }

        .status-badge {
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .status-badge.error {
            background: rgba(255, 60, 60, 0.1);
            color: #ff3c3c;
            border-color: rgba(255, 60, 60, 0.2);
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: currentColor;
            box-shadow: 0 0 8px currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; box-shadow: 0 0 4px currentColor; }
            50% { opacity: 1; box-shadow: 0 0 12px currentColor; }
            100% { opacity: 0.5; box-shadow: 0 0 4px currentColor; }
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .card-header {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .metric-value {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #fff, #a0a5b5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chart-container {
            grid-column: 1 / -1;
            height: 350px;
        }

        .top-objects {
            list-style: none;
        }

        .top-objects li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .top-objects li:last-child {
            border-bottom: none;
        }

        .obj-name {
            font-weight: 500;
            font-size: 1.1rem;
            text-transform: capitalize;
        }

        .obj-stats {
            display: flex;
            gap: 1rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .obj-count {
            color: var(--text-primary);
            font-weight: 700;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 8px;
            border-radius: 6px;
        }

        /* Utilidades */
        .flex-row { display: flex; gap: 1rem; align-items: center; }
        
        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

    </style>
</head>
<body>

    <header>
        <h1>🔬 VisionVR <span>Dashboard</span></h1>
        
        <div class="flex-row">
            <input type="text" id="server-ip" class="btn" value="http://localhost:5000" style="width: 200px; text-align: left; cursor: text;" placeholder="IP del servidor">
            <button class="btn" onclick="exportarCSV()" style="background: rgba(0, 255, 136, 0.1); color: var(--accent); border-color: rgba(0, 255, 136, 0.2);">Exportar CSV</button>
            <button class="btn" onclick="limpiarDatos()">Borrar Historial</button>
            <div id="status-badge" class="status-badge">
                <div class="status-indicator"></div>
                <span>Conectando...</span>
            </div>
        </div>
    </header>

    <div class="dashboard-grid">
        <!-- KPI 1 -->
        <div class="card">
            <div class="card-header">Total Detecciones</div>
            <div class="metric-value" id="kpi-total">0</div>
        </div>

        <!-- KPI 2 -->
        <div class="card">
            <div class="card-header">Objetos Únicos</div>
            <div class="metric-value" id="kpi-unicos">0</div>
        </div>

        <!-- KPI 3 -->
        <div class="card">
            <div class="card-header">Usuarios Activos</div>
            <div class="metric-value" id="kpi-usuarios">0</div>
        </div>

        <!-- Lista Top -->
        <div class="card" style="grid-row: span 2;">
            <div class="card-header">Top Objetos Detectados</div>
            <ul class="top-objects" id="top-list">
                <li><span class="text-secondary">Esperando datos...</span></li>
            </ul>
        </div>

        <!-- Gráfico -->
        <div class="card chart-container">
            <div class="card-header">Actividad Reciente (detecciones por segundo)</div>
            <canvas id="timelineChart"></canvas>
        </div>
    </div>

    <script>
        // Configuración de la gráfica Chart.js
        Chart.defaults.color = '#8b92a5';
        Chart.defaults.font.family = "'Outfit', sans-serif";
        
        const ctx = document.getElementById('timelineChart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 350);
        gradient.addColorStop(0, 'rgba(0, 255, 136, 0.5)');
        gradient.addColorStop(1, 'rgba(0, 255, 136, 0.0)');

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Detecciones',
                    data: [],
                    borderColor: '#00ff88',
                    backgroundColor: gradient,
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4, // Curvas suaves
                    pointRadius: 3,
                    pointBackgroundColor: '#00ff88'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        border: { display: false }
                    },
                    x: {
                        grid: { display: false },
                        border: { display: false }
                    }
                },
                animation: { duration: 400 } // Animación rápida para actualizaciones
            }
        });

        const badge = document.getElementById('status-badge');
        const badgeText = badge.querySelector('span');

        function setStatus(isOk) {
            if(isOk) {
                badge.className = 'status-badge';
                badgeText.textContent = 'En Vivo';
            } else {
                badge.className = 'status-badge error';
                badgeText.textContent = 'Desconectado';
            }
        }

        // Bucle de polling
        async function fetchStats() {
            const url = document.getElementById('server-ip').value.replace(/\/+$/, '');
            
            try {
                const res = await fetch(`${url}/estadisticas`);
                if(!res.ok) throw new Error("Error HTTP");
                
                const data = await res.json();
                setStatus(true);

                // Actualizar KPIs
                document.getElementById('kpi-total').textContent = data.total_detecciones;
                document.getElementById('kpi-unicos').textContent = data.objetos_unicos;
                document.getElementById('kpi-usuarios').textContent = data.usuarios_activos !== undefined ? data.usuarios_activos : 0;

                // Actualizar Lista Top
                const listEl = document.getElementById('top-list');
                listEl.innerHTML = '';
                if(data.top_objetos.length === 0) {
                    listEl.innerHTML = '<li><span class="text-secondary" style="color: #8b92a5;">No hay detecciones aún</span></li>';
                } else {
                    data.top_objetos.forEach(obj => {
                        listEl.innerHTML += `
                            <li>
                                <span class="obj-name">${obj.objeto}</span>
                                <div class="obj-stats">
                                    <span>Conf: ${Math.round(obj.confianza_promedio * 100)}%</span>
                                    <span class="obj-count">${obj.veces}</span>
                                </div>
                            </li>
                        `;
                    });
                }

                // Actualizar Gráfica
                if(data.timeline && data.timeline.length > 0) {
                    chart.data.labels = data.timeline.map(t => t.hora);
                    chart.data.datasets[0].data = data.timeline.map(t => t.conteo);
                    chart.update();
                }

            } catch(e) {
                console.error(e);
                setStatus(false);
            }
        }

        async function limpiarDatos() {
            const url = document.getElementById('server-ip').value.replace(/\/+$/, '');
            try {
                await fetch(`${url}/limpiar`, { method: 'POST' });
                // Reset visual inmediato
                chart.data.labels = [];
                chart.data.datasets[0].data = [];
                chart.update();
                fetchStats();
            } catch(e) {
                alert("Error limpiando historial");
            }
        }

        function exportarCSV() {
            const url = document.getElementById('server-ip').value.replace(/\/+$/, '');
            // Abrir la ruta de exportar en una nueva pestaña forzará la descarga del CSV
            window.open(`${url}/exportar`, '_blank');
        }

        // Iniciar ciclo de actualización cada 2 segundos
        setInterval(fetchStats, 2000);
        fetchStats();

    </script>
</body>
</html>
